[phases.setup]
nixPkgs = ["nodejs_20", "npm-10_x"]
aptPkgs = [
  "libglib2.0-0",
  "libnss3",
  "libnspr4",
  "libdbus-1-3",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libdrm2",
  "libxcb1",
  "libxkbcommon0",
  "libx11-6",
  "libxcomposite1",
  "libxdamage1",
  "libxext6",
  "libxfixes3",
  "libxrandr2",
  "libgbm1",
  "libpango-1.0-0",
  "libcairo2",
  "libasound2",
  "libatspi2.0-0",
  "libgtk-3-0",
  "libxshmfence1",
  "fonts-liberation",
  "ca-certificates",
]

[phases.install]
cmds = [
  "npm ci --include=dev",
  "npx playwright install chromium",
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm run start:prod"
