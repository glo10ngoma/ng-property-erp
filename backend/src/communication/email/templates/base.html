<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>{{title}}</title>
  </head>
  <body style="margin:0;padding:24px;background:#f5f7fb;font-family:Arial,Helvetica,sans-serif;color:#122033;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0">
      <tr>
        <td align="center">
          <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:640px;background:#ffffff;border:1px solid #d8e0eb;border-radius:12px;">
            <tr>
              <td style="padding:28px 32px 12px 32px;">
                <h1 style="margin:0;font-size:22px;line-height:1.3;color:#0f2d52;">{{title}}</h1>
              </td>
            </tr>
            <tr>
              <td style="padding:0 32px 28px 32px;">
                {{body}}
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
  </html>
